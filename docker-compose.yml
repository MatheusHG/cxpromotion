services:
  postgres:
    image: postgres:16-alpine
    container_name: cx-promocoes-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cx_promocoes
    ports:
      - "5432:5432"
    volumes:
      - cx_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cx_promocoes"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cx_pg_data:
